name: Build AssetLoader ARM64 Linux BIN

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build_bin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable ARM64 Multiarch and Install ARM64 Curl
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y g++-aarch64-linux-gnu crossbuild-essential-arm64 pkg-config
          sudo apt-get install -y libcurl4-openssl-dev:arm64
          ls -l /usr/aarch64-linux-gnu/include/curl/curl.h || (echo "curl.h NICHT DA! Check Makefile-Includes!" && exit 1)

      - name: Build AssetLoader BIN
        run: |
          make -C plugin/AssetLoader clean
          make -C plugin/AssetLoader

      - name: Collect AssetLoader BIN
        run: |
          mkdir -p Release
          if [ -f build/AssetLoader/AssetLoader.bin ]; then
            cp build/AssetLoader/AssetLoader.bin Release/
          else
            echo "AssetLoader bin fehlt!"
            exit 1
          fi

      - name: Upload AssetLoader BIN
        uses: actions/upload-artifact@v4
        with:
          name: AssetLoader-bin
          path: Release/AssetLoader.bin
          if-no-files-found: error
