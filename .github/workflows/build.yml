name: Build PKMswitch NRO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build NRO (devkitPro)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Switch portlibs needed by the build
      - name: Install Switch portlibs
        run: |
          dkp-pacman -Syuu --noconfirm
          dkp-pacman -S --noconfirm \
            switch-sdl2 \
            switch-mesa

      # Build the NRO (Makefile will auto-fetch ImGui via ensure-imgui)
      - name: Build PKMswitch.nro
        run: |
          cd "${GITHUB_WORKSPACE}"
          make

      # Package build outputs into a release zip
      - name: Package Release zip
        run: |
          cd "${GITHUB_WORKSPACE}"
          mkdir -p Release
          ZIP_NAME="Release/PKMswitch_${GITHUB_SHA}.zip"
          INCLUDE_PATHS="PKMswitch.nro assets/"
          if [ -d i18n ]; then INCLUDE_PATHS="${INCLUDE_PATHS} i18n/"; fi
          if [ -d plugin ]; then INCLUDE_PATHS="${INCLUDE_PATHS} plugin/"; fi
          zip -r "${ZIP_NAME}" ${INCLUDE_PATHS}
          echo "Created ${ZIP_NAME}"
          ls -lh Release/

      # Upload the release zip as a build artifact
      - name: Upload Release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKMswitch-release
          path: Release/*.zip
          if-no-files-found: error
