name: Build PKMswitch NRO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build NRO (prebuilt image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      # Must be lowercase
      image: ghcr.io/smapifan/devkita64-pkmswitch:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build PKMswitch.nro
        run: |
          set -eux
          cd "${GITHUB_WORKSPACE}"
          make

      - name: Package Release zip
        run: |
          set -eux
          cd "${GITHUB_WORKSPACE}"
          mkdir -p Release
          ZIP_NAME="PKMswitch_${GITHUB_SHA}.zip"
          zip -r "Release/${ZIP_NAME}" \
            PKMswitch.nro \
            assets \
            i18n \
            plugin || true
          ls -la Release

      - name: Upload Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKMswitch-Release
          path: Release/*.zip
          if-no-files-found: error
