name: Build PKMswitch bundle

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ghcr.io/smapifan/devkita64-pkmswitch:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build bundle (no sdmc layout)
        run: |
          chmod +x ci/dist.sh
          ./ci/dist.sh

      - name: Zip bundle
        run: |
          set -eux
          mkdir -p Release
          ZIP_NAME="PKMswitch_${GITHUB_SHA}.zip"
          (cd dist && zip -r "../Release/${ZIP_NAME}" PKMswitch)
          ls -la Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKMswitch-bundle
          path: Release/*.zip
          if-no-files-found: error
