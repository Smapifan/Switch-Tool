name: Build PKMswitch NRO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build NRO (prebuilt image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ghcr.io/${{ github.repository_owner }}/devkita64-pkmswitch:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build PKMswitch.nro
        run: |
          set -eux
          cd "${GITHUB_WORKSPACE}"
          make

      - name: Package Release zip
        run: |
          set -eux
          cd "${GITHUB_WORKSPACE}"
          mkdir -p Release
          ZIP_NAME="Release/PKMswitch_${GITHUB_SHA}.zip"
          INCLUDE_PATHS="PKMswitch.nro assets/"
          if [ -d i18n ]; then INCLUDE_PATHS="${INCLUDE_PATHS} i18n/"; fi
          if [ -d plugin ]; then INCLUDE_PATHS="${INCLUDE_PATHS} plugin/"; fi
          zip -r "${ZIP_NAME}" ${INCLUDE_PATHS}
          echo "Created ${ZIP_NAME}"
          ls -lh Release/

      - name: Upload Release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKMswitch-release
          path: Release/*.zip
          if-no-files-found: error
