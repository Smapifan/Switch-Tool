name: Build PKMswitch bundle (Homebrew & IDs-Exporter)

on:
  push:
    branches: [main, master, build]
  pull_request:
    branches: [main, master, build]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ghcr.io/smapifan/devkita64-pkmswitch:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build main PKMswitch NRO
        run: |
          make clean
          make

      - name: Build IDs-Exporter NRO
        run: |
          make -C pokemon-id-exporter clean
          make -C pokemon-id-exporter

      - name: Collect outputs
        run: |
          mkdir -p Release
          [ -f build/PKMswitch.nro ] && cp build/PKMswitch.nro Release/ || { echo "Main NRO fehlt"; exit 1; }
          [ -f pokemon-id-exporter/build/pokemon-id-exporter.nro ] && cp pokemon-id-exporter/build/pokemon-id-exporter.nro Release/ || { echo "IDs-Exporter NRO fehlt"; exit 1; }

      - name: Zip bundle
        run: |
          cd Release
          zip PKMswitch_bundle.zip *
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKMswitch-bundle
          path: Release/PKMswitch_bundle.zip
          if-no-files-found: error
