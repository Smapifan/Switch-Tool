name: Build PKMswitch NRO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build + package dist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      # Must be lowercase; packages (SDL2, curl) are pre-installed in the image
      image: ghcr.io/smapifan/devkita64-pkmswitch:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and package dist
        run: |
          sh ci/dist.sh

      - name: Upload Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKMswitch-Release
          path: Release/*
          if-no-files-found: error
