name: Build PKMswitch NRO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build NRO (prebuilt image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      # Must be lowercase
      image: ghcr.io/smapifan/devkita64-pkmswitch:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and assemble SD card layout
        run: |
          set -eux
          cd "${GITHUB_WORKSPACE}"
          bash ci/dist.sh

      - name: Package SD card zip
        run: |
          set -eux
          cd "${GITHUB_WORKSPACE}"
          mkdir -p Release
          ZIP_NAME="PKMswitch_${GITHUB_SHA}.zip"
          cd dist
          zip -r "../Release/${ZIP_NAME}" sdmc
          cd ..
          ls -la Release

      - name: Upload SD card artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKMswitch-sdmc
          path: Release/*.zip
          if-no-files-found: error
